<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity 2K26 | Silver Jubilee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sd-red: #d32f2f;
            --inf-blue: #00bcd4;
            --inf-pink: #ff4081;
            --inf-gradient: linear-gradient(135deg, #00bcd4 0%, #ff4081 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #fdfbfb, #ebedee, #f3f9ff, #fff5f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #2d3436;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Bar glass effect */
        .top-bar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 15px 0;
            z-index: 1000;
        }

        .inst-logo { max-height: 70px; }
        .event-logo { max-height: 90px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }

        /* --- UPDATED TABS SECTION --- */
        .nav-tabs { 
            border: none; 
            margin-top: 30px; 
            gap: 10px;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #555;
            font-weight: 600;
            padding: 10px 20px;
            transition: all 0.3s ease;
            position: relative;
            background: transparent;
        }

        /* The Hover Underline Element */
        .nav-tabs .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: 0;
            left: 50%;
            background: var(--inf-gradient);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            transform: translateX(-50%);
            border-radius: 10px;
        }

        /* Hover State Action */
        .nav-tabs .nav-link:hover {
            color: var(--inf-blue) !important;
            transform: translateY(-2px);
        }

        .nav-tabs .nav-link:hover::after {
            width: 80%; /* Underline grows on hover */
        }

        /* Active Tab Style (Solid Pill) */
        .nav-tabs .nav-link.active {
            background: var(--inf-gradient) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            border-radius: 30px;
            transform: translateY(0);
        }

        /* Hide underline for the active tab */
        .nav-tabs .nav-link.active::after {
            display: none;
        }
        /* --- END TABS SECTION --- */

        .section-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }

        .section-title {
            font-weight: 800;
            background: var(--inf-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .media-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .media-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .media-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .media-title {
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            color: #333;
        }

        .carousel {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
